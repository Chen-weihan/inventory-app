<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>包飯店庫存管理</title>
<style>
  :root {
    --surface-1: #fcfcfb;
    --page: #f9f9f7;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --grid: #e1e0d9;
    --baseline: #c3c2b7;
    --border: rgba(11,11,11,0.10);
    --wh-1: #2a78d6;   /* 2F庫 */
    --wh-2: #1baf7a;   /* 楠梓庫 */
    --wh-3: #eda100;   /* 中正路庫 */
    --accent: #2a78d6;
    --good: #0ca30c;
    --critical: #d03b3b;
    --good-text: #006300;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --grid: #2c2c2a;
      --baseline: #383835;
      --border: rgba(255,255,255,0.10);
      --wh-1: #3987e5;
      --wh-2: #199e70;
      --wh-3: #c98500;
      --accent: #3987e5;
      --good-text: #0ca30c;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: system-ui, -apple-system, "PingFang TC", "Segoe UI", sans-serif;
    background: var(--page);
    color: var(--text-primary);
    padding-bottom: calc(64px + env(safe-area-inset-bottom));
  }
  header.app-header {
    padding: 16px 16px 8px;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  header.app-header h1 { font-size: 20px; font-weight: 700; }
  header.app-header .date { font-size: 13px; color: var(--text-muted); }
  main { padding: 0 12px; max-width: 720px; margin: 0 auto; }

  /* ---- 底部導覽 ---- */
  nav.tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    display: flex;
    background: var(--surface-1);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav.tabbar button {
    flex: 1; border: none; background: none; cursor: pointer;
    padding: 8px 0 10px;
    font-size: 11px; color: var(--text-muted);
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    min-height: 56px;
  }
  nav.tabbar button .ico { font-size: 22px; line-height: 1; }
  nav.tabbar button.active { color: var(--accent); font-weight: 600; }

  .view { display: none; }
  .view.active { display: block; }

  /* ---- 卡片 ---- */
  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .card h2 { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; }

  /* ---- KPI ---- */
  .kpi-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .kpi {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 10px;
  }
  .kpi .label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .kpi .value { font-size: 26px; font-weight: 700; }
  .kpi .sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  /* ---- 庫別列 ---- */
  .wh-line { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--grid); }
  .wh-line:last-child { border-bottom: none; }
  .wh-dot { width: 10px; height: 10px; border-radius: 3px; flex: none; }
  .wh-line .name { font-size: 14px; flex: 1; }
  .wh-line .qty { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .wh-line .items { font-size: 12px; color: var(--text-muted); width: 64px; text-align: right; }

  /* ---- 條狀圖 ---- */
  .bar-row { margin-bottom: 12px; }
  .bar-row .bar-head { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .bar-row .bar-head .total { font-weight: 600; font-variant-numeric: tabular-nums; }
  .bar-track { display: flex; gap: 2px; height: 14px; }
  .bar-seg { border-radius: 3px; min-width: 3px; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; }
  .legend .item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }

  /* ---- 表單 ---- */
  .seg-control { display: flex; gap: 6px; margin-bottom: 14px; }
  .seg-control button {
    flex: 1; padding: 12px 0; font-size: 15px; font-weight: 600;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface-1); color: var(--text-secondary); cursor: pointer;
  }
  .seg-control button.active[data-type="in"]  { background: var(--accent); border-color: var(--accent); color: #fff; }
  .seg-control button.active[data-type="out"] { background: var(--critical); border-color: var(--critical); color: #fff; }
  .seg-control button.active[data-type="adjust"] { background: var(--text-secondary); border-color: var(--text-secondary); color: #fff; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
  .chips { display: flex; gap: 8px; }
  .chips button {
    flex: 1; padding: 14px 0; font-size: 15px; font-weight: 600;
    border: 1.5px solid var(--border); border-radius: 10px;
    background: var(--surface-1); color: var(--text-primary); cursor: pointer;
  }
  .chips button.sel { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, var(--surface-1)); }

  select, input[type="text"], input[type="number"] {
    width: 100%; padding: 13px 12px; font-size: 16px;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface-1); color: var(--text-primary);
    appearance: none;
  }
  .qty-stepper { display: flex; gap: 8px; align-items: stretch; }
  .qty-stepper button {
    width: 58px; font-size: 24px; font-weight: 600;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface-1); color: var(--text-primary); cursor: pointer;
  }
  .qty-stepper input { text-align: center; font-size: 22px; font-weight: 700; }

  .btn-primary {
    width: 100%; padding: 16px 0; font-size: 17px; font-weight: 700;
    background: var(--accent); color: #fff; border: none; border-radius: 12px; cursor: pointer;
  }
  .btn-ghost {
    width: 100%; padding: 12px 0; font-size: 14px;
    background: none; color: var(--accent); border: 1px dashed var(--accent);
    border-radius: 10px; cursor: pointer; margin-top: 8px;
  }
  .row2 { display: flex; gap: 8px; }
  .row2 > * { flex: 1; }

  /* ---- 庫存表 ---- */
  .search-bar { margin-bottom: 10px; }
  table.stock { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.stock th, table.stock td { padding: 9px 6px; text-align: right; border-bottom: 1px solid var(--grid); }
  table.stock th:first-child, table.stock td:first-child { text-align: left; }
  table.stock th { color: var(--text-muted); font-weight: 500; font-size: 12px; }
  table.stock td { font-variant-numeric: tabular-nums; }
  table.stock td.total { font-weight: 700; }
  table.stock td.zero { color: var(--text-muted); }
  .unit-tag { color: var(--text-muted); font-size: 11px; }

  /* ---- 紀錄 ---- */
  .txn { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--grid); }
  .txn:last-child { border-bottom: none; }
  .txn .badge {
    flex: none; width: 40px; text-align: center; padding: 5px 0;
    border-radius: 8px; font-size: 12px; font-weight: 700;
  }
  .txn .badge.in  { background: color-mix(in srgb, var(--good) 15%, var(--surface-1)); color: var(--good-text); }
  .txn .badge.out { background: color-mix(in srgb, var(--critical) 12%, var(--surface-1)); color: var(--critical); }
  .txn .badge.adjust { background: color-mix(in srgb, var(--text-muted) 15%, var(--surface-1)); color: var(--text-secondary); }
  .txn .body { flex: 1; min-width: 0; }
  .txn .body .l1 { font-size: 14px; font-weight: 600; }
  .txn .body .l2 { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .txn .qty { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .txn .del { border: none; background: none; color: var(--text-muted); font-size: 16px; cursor: pointer; padding: 6px; }

  .empty { text-align: center; color: var(--text-muted); font-size: 14px; padding: 28px 0; }

  /* ---- Toast ---- */
  #toast {
    position: fixed; left: 50%; bottom: calc(84px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(20px);
    background: var(--text-primary); color: var(--page);
    padding: 10px 18px; border-radius: 999px; font-size: 14px; font-weight: 600;
    opacity: 0; pointer-events: none; transition: all .25s ease; z-index: 50;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  dialog {
    border: 1px solid var(--border); border-radius: 14px; padding: 18px;
    background: var(--surface-1); color: var(--text-primary);
    width: min(92vw, 400px); margin: auto;
  }
  dialog::backdrop { background: rgba(0,0,0,.4); }
  dialog h3 { font-size: 16px; margin-bottom: 14px; }
</style>
</head>
<body>

<header class="app-header">
  <h1 id="pageTitle">總覽</h1>
  <span class="date" id="todayLabel"></span>
</header>

<main>
  <!-- ============ 總覽 ============ -->
  <section class="view active" id="view-dash">
    <div class="kpi-row">
      <div class="kpi"><div class="label">商品品項</div><div class="value" id="kpiProducts">0</div></div>
      <div class="kpi"><div class="label">今日入庫</div><div class="value" id="kpiInToday">0</div><div class="sub">筆</div></div>
      <div class="kpi"><div class="label">今日出庫</div><div class="value" id="kpiOutToday">0</div><div class="sub">筆</div></div>
    </div>

    <div class="card">
      <h2>各庫存量（總數量）</h2>
      <div id="whSummary"></div>
    </div>

    <div class="card">
      <h2>商品庫存分佈（前 8 名）</h2>
      <div id="barChart"></div>
      <div class="legend" id="barLegend"></div>
    </div>

    <div class="card" id="demoCard" style="display:none">
      <h2>還沒有資料</h2>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:10px">
        可以先載入範例資料試試操作手感，之後一鍵清除即可。
      </p>
      <button class="btn-ghost" onclick="loadDemo()">載入範例資料</button>
    </div>
  </section>

  <!-- ============ 輸入 ============ -->
  <section class="view" id="view-entry">
    <div class="card">
      <div class="seg-control" id="typeSeg">
        <button data-type="in" class="active">入庫 ＋</button>
        <button data-type="out">出庫 −</button>
        <button data-type="adjust">盤點 ＝</button>
      </div>

      <div class="field">
        <label>庫別</label>
        <div class="chips" id="whChips"></div>
      </div>

      <div class="field">
        <label>商品</label>
        <select id="productSelect"></select>
        <button class="btn-ghost" onclick="openNewProduct()">＋ 新增商品</button>
      </div>

      <div class="field">
        <label id="qtyLabel">數量</label>
        <div class="qty-stepper">
          <button onclick="stepQty(-1)">−</button>
          <input type="number" id="qtyInput" inputmode="numeric" min="0" value="1">
          <button onclick="stepQty(1)">＋</button>
        </div>
      </div>

      <div class="field">
        <label>備註（選填）</label>
        <input type="text" id="noteInput" placeholder="例如：早上生產批次">
      </div>

      <button class="btn-primary" onclick="saveTxn()">儲存</button>
    </div>
  </section>

  <!-- ============ 庫存 ============ -->
  <section class="view" id="view-stock">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜尋商品…" oninput="renderStock()">
    </div>
    <div class="card" style="overflow-x:auto">
      <table class="stock">
        <thead>
          <tr><th>商品</th><th>2F庫</th><th>楠梓庫</th><th>中正路庫</th><th>合計</th></tr>
        </thead>
        <tbody id="stockBody"></tbody>
      </table>
      <div class="empty" id="stockEmpty" style="display:none">尚無商品，請先到「輸入」新增</div>
    </div>
  </section>

  <!-- ============ 紀錄 ============ -->
  <section class="view" id="view-log">
    <div class="card">
      <div id="txnList"></div>
      <div class="empty" id="logEmpty" style="display:none">尚無異動紀錄</div>
    </div>
    <button class="btn-ghost" style="border-color:var(--critical);color:var(--critical)" onclick="clearAll()">清除全部資料</button>
  </section>
</main>

<nav class="tabbar">
  <button class="active" data-view="dash"><span class="ico">📊</span>總覽</button>
  <button data-view="entry"><span class="ico">✏️</span>輸入</button>
  <button data-view="stock"><span class="ico">📦</span>庫存</button>
  <button data-view="log"><span class="ico">🕐</span>紀錄</button>
</nav>

<div id="toast"></div>

<dialog id="newProductDlg">
  <h3>新增商品</h3>
  <div class="field">
    <label>商品名稱</label>
    <input type="text" id="npName" placeholder="例如：煙燻滷鴨翅">
  </div>
  <div class="field">
    <label>單位</label>
    <input type="text" id="npUnit" placeholder="例如：包 / 支 / 斤" value="包">
  </div>
  <div class="row2">
    <button class="btn-ghost" onclick="newProductDlg.close()">取消</button>
    <button class="btn-primary" onclick="confirmNewProduct()">新增</button>
  </div>
</dialog>

<script>
/* =====================================================
   資料層 — 目前使用 localStorage（單機示範）
   之後接 Supabase 時只需改寫 store 這個物件
   ===================================================== */
const WAREHOUSES = ['2F庫', '楠梓庫', '中正路庫'];
const WH_COLORS = ['var(--wh-1)', 'var(--wh-2)', 'var(--wh-3)'];

const store = {
  KEY: 'inv_data_v1',
  data: { products: [], txns: [] },
  load() {
    try { this.data = JSON.parse(localStorage.getItem(this.KEY)) || { products: [], txns: [] }; }
    catch { this.data = { products: [], txns: [] }; }
  },
  save() { localStorage.setItem(this.KEY, JSON.stringify(this.data)); },
};
store.load();

/* ---------- 庫存計算：由異動紀錄累加 ---------- */
function stockOf(productId, wh) {
  let s = 0;
  for (const t of store.data.txns) {
    if (t.productId !== productId || t.wh !== wh) continue;
    if (t.type === 'in') s += t.qty;
    else if (t.type === 'out') s -= t.qty;
    else if (t.type === 'adjust') s += t.qty; // adjust 已存為差額
  }
  return s;
}
function stockMatrix() {
  return store.data.products.map(p => {
    const perWh = WAREHOUSES.map(w => stockOf(p.id, w));
    return { p, perWh, total: perWh.reduce((a, b) => a + b, 0) };
  });
}

/* =====================================================
   畫面切換
   ===================================================== */
const TITLES = { dash: '總覽', entry: '庫存輸入', stock: '各庫庫存', log: '異動紀錄' };
document.querySelectorAll('nav.tabbar button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('nav.tabbar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + btn.dataset.view).classList.add('active');
    document.getElementById('pageTitle').textContent = TITLES[btn.dataset.view];
    renderAll();
  };
});

/* =====================================================
   輸入表單
   ===================================================== */
let entryType = 'in';
let entryWh = WAREHOUSES[0];

document.querySelectorAll('#typeSeg button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#typeSeg button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    entryType = btn.dataset.type;
    document.getElementById('qtyLabel').textContent =
      entryType === 'adjust' ? '盤點後實際數量（系統自動計算差額）' : '數量';
  };
});

function renderWhChips() {
  const box = document.getElementById('whChips');
  box.innerHTML = '';
  WAREHOUSES.forEach(w => {
    const b = document.createElement('button');
    b.textContent = w;
    if (w === entryWh) b.classList.add('sel');
    b.onclick = () => { entryWh = w; renderWhChips(); };
    box.appendChild(b);
  });
}

function renderProductSelect() {
  const sel = document.getElementById('productSelect');
  const cur = sel.value;
  sel.innerHTML = '';
  if (!store.data.products.length) {
    const o = document.createElement('option');
    o.textContent = '請先新增商品'; o.value = '';
    sel.appendChild(o);
    return;
  }
  store.data.products.forEach(p => {
    const o = document.createElement('option');
    o.value = p.id;
    o.textContent = `${p.name}（${p.unit}）`;
    sel.appendChild(o);
  });
  if (cur && store.data.products.some(p => p.id === cur)) sel.value = cur;
}

function stepQty(d) {
  const el = document.getElementById('qtyInput');
  el.value = Math.max(0, (parseInt(el.value) || 0) + d);
}

function saveTxn() {
  const productId = document.getElementById('productSelect').value;
  const qty = parseInt(document.getElementById('qtyInput').value);
  if (!productId) return toast('請先新增商品');
  if (isNaN(qty) || qty < 0) return toast('請輸入正確數量');
  if (qty === 0 && entryType !== 'adjust') return toast('數量需大於 0');

  let recordQty = qty;
  if (entryType === 'adjust') {
    recordQty = qty - stockOf(productId, entryWh); // 差額
    if (recordQty === 0) return toast('數量與現有庫存相同，無需調整');
  }
  if (entryType === 'out' && qty > stockOf(productId, entryWh)) {
    if (!confirm(`${entryWh} 目前庫存只有 ${stockOf(productId, entryWh)}，確定要出 ${qty} 嗎？`)) return;
  }

  store.data.txns.unshift({
    id: 't' + Date.now() + Math.random().toString(36).slice(2, 6),
    ts: Date.now(),
    type: entryType,
    productId,
    wh: entryWh,
    qty: recordQty,
    note: document.getElementById('noteInput').value.trim(),
  });
  store.save();
  document.getElementById('qtyInput').value = 1;
  document.getElementById('noteInput').value = '';
  const p = store.data.products.find(p => p.id === productId);
  toast(`已儲存：${p.name} ${entryType === 'in' ? '入庫' : entryType === 'out' ? '出庫' : '盤點調整'}`);
  renderAll();
}

/* ---------- 新增商品 ---------- */
const newProductDlg = document.getElementById('newProductDlg');
function openNewProduct() {
  document.getElementById('npName').value = '';
  newProductDlg.showModal();
}
function confirmNewProduct() {
  const name = document.getElementById('npName').value.trim();
  const unit = document.getElementById('npUnit').value.trim() || '包';
  if (!name) return toast('請輸入商品名稱');
  if (store.data.products.some(p => p.name === name)) return toast('商品已存在');
  const p = { id: 'p' + Date.now(), name, unit };
  store.data.products.push(p);
  store.save();
  newProductDlg.close();
  renderProductSelect();
  document.getElementById('productSelect').value = p.id;
  toast(`已新增：${name}`);
}

/* =====================================================
   總覽
   ===================================================== */
function renderDash() {
  const mat = stockMatrix();
  document.getElementById('kpiProducts').textContent = store.data.products.length;

  const today = new Date(); today.setHours(0, 0, 0, 0);
  const t0 = today.getTime();
  document.getElementById('kpiInToday').textContent =
    store.data.txns.filter(t => t.ts >= t0 && t.type === 'in').length;
  document.getElementById('kpiOutToday').textContent =
    store.data.txns.filter(t => t.ts >= t0 && t.type === 'out').length;

  /* 各庫總量 */
  const box = document.getElementById('whSummary');
  box.innerHTML = '';
  WAREHOUSES.forEach((w, i) => {
    const total = mat.reduce((a, r) => a + r.perWh[i], 0);
    const items = mat.filter(r => r.perWh[i] > 0).length;
    box.insertAdjacentHTML('beforeend', `
      <div class="wh-line">
        <span class="wh-dot" style="background:${WH_COLORS[i]}"></span>
        <span class="name">${w}</span>
        <span class="items">${items} 品項</span>
        <span class="qty">${total.toLocaleString()}</span>
      </div>`);
  });

  /* 前 8 名條狀圖 */
  const chart = document.getElementById('barChart');
  const legend = document.getElementById('barLegend');
  chart.innerHTML = ''; legend.innerHTML = '';
  const top = mat.filter(r => r.total > 0).sort((a, b) => b.total - a.total).slice(0, 8);
  if (!top.length) {
    chart.innerHTML = '<div class="empty">尚無庫存資料</div>';
  } else {
    const max = top[0].total;
    top.forEach(r => {
      const segs = r.perWh.map((q, i) => q > 0
        ? `<div class="bar-seg" style="background:${WH_COLORS[i]};width:${(q / max) * 100}%"></div>` : ''
      ).join('');
      chart.insertAdjacentHTML('beforeend', `
        <div class="bar-row">
          <div class="bar-head"><span>${r.p.name}</span><span class="total">${r.total.toLocaleString()} ${r.p.unit}</span></div>
          <div class="bar-track">${segs}</div>
        </div>`);
    });
    WAREHOUSES.forEach((w, i) => {
      legend.insertAdjacentHTML('beforeend',
        `<span class="item"><span class="wh-dot" style="background:${WH_COLORS[i]}"></span>${w}</span>`);
    });
  }

  document.getElementById('demoCard').style.display =
    (store.data.products.length || store.data.txns.length) ? 'none' : 'block';
}

/* =====================================================
   庫存表
   ===================================================== */
function renderStock() {
  const q = (document.getElementById('searchInput').value || '').trim();
  const body = document.getElementById('stockBody');
  body.innerHTML = '';
  const rows = stockMatrix().filter(r => !q || r.p.name.includes(q));
  document.getElementById('stockEmpty').style.display = rows.length ? 'none' : 'block';
  rows.forEach(r => {
    const cells = r.perWh.map(v =>
      `<td class="${v === 0 ? 'zero' : ''}">${v.toLocaleString()}</td>`).join('');
    body.insertAdjacentHTML('beforeend', `
      <tr>
        <td>${r.p.name} <span class="unit-tag">${r.p.unit}</span></td>
        ${cells}
        <td class="total">${r.total.toLocaleString()}</td>
      </tr>`);
  });
}

/* =====================================================
   異動紀錄
   ===================================================== */
const TYPE_LABEL = { in: '入庫', out: '出庫', adjust: '盤點' };
function renderLog() {
  const list = document.getElementById('txnList');
  list.innerHTML = '';
  const txns = store.data.txns.slice(0, 50);
  document.getElementById('logEmpty').style.display = txns.length ? 'none' : 'block';
  txns.forEach(t => {
    const p = store.data.products.find(p => p.id === t.productId);
    const d = new Date(t.ts);
    const time = `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    const sign = t.type === 'in' ? '+' : t.type === 'out' ? '−' : (t.qty >= 0 ? '+' : '−');
    list.insertAdjacentHTML('beforeend', `
      <div class="txn">
        <span class="badge ${t.type}">${TYPE_LABEL[t.type]}</span>
        <div class="body">
          <div class="l1">${p ? p.name : '(已刪除商品)'}</div>
          <div class="l2">${t.wh}・${time}${t.note ? '・' + t.note : ''}</div>
        </div>
        <span class="qty">${sign}${Math.abs(t.qty).toLocaleString()}</span>
        <button class="del" onclick="delTxn('${t.id}')">✕</button>
      </div>`);
  });
}
function delTxn(id) {
  if (!confirm('刪除這筆紀錄？庫存會跟著還原。')) return;
  store.data.txns = store.data.txns.filter(t => t.id !== id);
  store.save();
  renderAll();
  toast('已刪除');
}
function clearAll() {
  if (!confirm('確定清除全部商品與紀錄？此動作無法復原。')) return;
  store.data = { products: [], txns: [] };
  store.save();
  renderAll();
  toast('已清除全部資料');
}

/* =====================================================
   範例資料
   ===================================================== */
function loadDemo() {
  const items = [
    ['煙燻滷鴨翅', '包'], ['煙燻鴨腿', '支'], ['滷豆干', '包'],
    ['煙燻米血', '包'], ['滷大腸', '包'],
  ];
  const now = Date.now();
  store.data.products = items.map(([name, unit], i) => ({ id: 'p_demo' + i, name, unit }));
  store.data.txns = [];
  store.data.products.forEach((p, i) => {
    WAREHOUSES.forEach((w, j) => {
      store.data.txns.push({
        id: 't_demo' + i + '_' + j,
        ts: now - (i * 3 + j) * 3600 * 1000,
        type: 'in', productId: p.id, wh: w,
        qty: [80, 40, 30, 120, 60][((i + j) * 7) % 5],
        note: '範例資料',
      });
    });
  });
  store.save();
  renderAll();
  toast('已載入範例資料');
}

/* =====================================================
   共用
   ===================================================== */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

function renderAll() {
  renderWhChips();
  renderProductSelect();
  renderDash();
  renderStock();
  renderLog();
}

const td = new Date();
document.getElementById('todayLabel').textContent =
  `${td.getFullYear()}/${td.getMonth() + 1}/${td.getDate()}`;
renderAll();
</script>
</body>
